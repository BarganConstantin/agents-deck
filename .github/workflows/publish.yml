name: publish

# Triggered by pushing a semver tag (v1.1.0, v1.1.1, v2.0.0, …). Tag must
# match the version in package.json — the workflow verifies this and aborts
# on mismatch so you can't accidentally publish 1.1.0 from a 1.0.x branch.
on:
  push:
    tags:
      - 'v*.*.*'
  # Also allow a manual run from the Actions tab — handy for re-publishing
  # after a transient npm outage. Picks up the version from package.json.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for `npm publish --provenance`
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag matches package.json
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG_VERSION"
          echo "tag:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      # Publish under BOTH names from the same build/tarball: the legacy name
      # (agent-dag) first so existing installs always update, then the primary
      # name (agents-deck). Each publish is idempotent — it skips if that
      # version is already on the registry — so the workflow is safe to re-run
      # (e.g. after fixing token scope) without erroring on the already-shipped
      # name. The two steps are independent: a failure in one does not block
      # the other.
      - name: Publish to npm (agent-dag, legacy alias)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # npm view prints the version string if published, empty otherwise
          # (and exits 0 either way for an existing package) — so test the
          # OUTPUT, not the exit code.
          EXISTING=$(npm view "agent-dag@$VERSION" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "agent-dag@$VERSION already published — skipping."
          else
            npm pkg set name=agent-dag
            npm publish --provenance --access public
            npm pkg set name=agents-deck
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (agents-deck)
        if: ${{ !cancelled() }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(npm view "agents-deck@$VERSION" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "agents-deck@$VERSION already published — skipping."
          else
            npm pkg set name=agents-deck
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (ccdeck, stub alias)
        if: ${{ !cancelled() }}
        run: |
          cd ccdeck
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(npm view "ccdeck@$VERSION" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "ccdeck@$VERSION already published — skipping."
          else
            npm install --ignore-scripts
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: ${{ !cancelled() }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CCDECK_VERSION=$(node -p "require('./ccdeck/package.json').version")
          echo "### Published v$VERSION :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- https://www.npmjs.com/package/agents-deck/v/$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- https://www.npmjs.com/package/agent-dag/v/$VERSION (legacy alias)" >> $GITHUB_STEP_SUMMARY
          echo "- https://www.npmjs.com/package/ccdeck/v/$CCDECK_VERSION (stub alias)" >> $GITHUB_STEP_SUMMARY
